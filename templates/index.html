<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loan Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow-lg p-4">
    <h2 class="text-center mb-4">Loan Prediction System</h2>

    <!-- 🔥 IMPORTANT FIX -->
    <form action="/predict" method="POST">

      <!-- Row 1 -->
      <div class="row mb-3">
        <div class="col">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-control" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>

        <div class="col">
          <label class="form-label">Married</label>
          <select name="married" class="form-control" required>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>
      </div>

      <!-- Row 2 -->
      <div class="row mb-3">
        <div class="col">
          <label class="form-label">Dependents</label>
          <select name="dependents" class="form-control" required>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3+">3+</option>
          </select>
        </div>

        <div class="col">
          <label class="form-label">Education</label>
          <select name="education" class="form-control" required>
            <option value="Graduate">Graduate</option>
            <option value="Not Graduate">Not Graduate</option>
          </select>
        </div>
      </div>

      <!-- Row 3 -->
      <div class="row mb-3">
        <div class="col">
          <label class="form-label">Self Employed</label>
          <select name="employed" class="form-control" required>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="col">
          <label class="form-label">Credit History (1 or 0)</label>
          <input type="number" step="0.1" name="credit" class="form-control" required>
        </div>
      </div>

      <!-- Row 4 -->
      <div class="row mb-3">
        <div class="col">
          <label class="form-label">Property Area</label>
          <select name="area" class="form-control" required>
            <option value="Rural">Rural</option>
            <option value="Semiurban">Semiurban</option>
            <option value="Urban">Urban</option>
          </select>
        </div>

        <div class="col">
          <label class="form-label">Applicant Income</label>
          <input type="number" name="ApplicantIncome" class="form-control" required>
        </div>
      </div>

      <!-- Row 5 -->
      <div class="row mb-3">
        <div class="col">
          <label class="form-label">Coapplicant Income</label>
          <input type="number" name="CoapplicantIncome" class="form-control" required>
        </div>

        <div class="col">
          <label class="form-label">Loan Amount</label>
          <input type="number" name="LoanAmount" class="form-control" required>
        </div>
      </div>

      <!-- Row 6 -->
      <div class="mb-3">
        <label class="form-label">Loan Amount Term</label>
        <input type="number" name="Loan_Amount_Term" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-primary w-100">
        Predict Loan Status
      </button>

    </form>
  </div>
</div>

</body>
</html>
